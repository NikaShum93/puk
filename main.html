<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quiz Miner</title>

  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#2c3e50; }
    
    #game-app {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      background: linear-gradient(to bottom, #3498db, #2c3e50);
      font-family: 'Montserrat', sans-serif;
      user-select: none;
      position: relative;
    }

    .ui-layer {
      position: absolute; top: 0; left: 0; width: 100%;
      padding: 15px 30px; box-sizing: border-box;
      pointer-events: none; z-index: 10;
      color: white; text-align: center;
    }

    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }

    .progress-box {
      width: 50%; height: 16px; background: rgba(0,0,0,0.3);
      border-radius: 8px; border: 2px solid #fff; overflow: hidden;
    }
    .progress-fill { width: 0%; height: 100%; background: #2ecc71; transition: width 0.3s; }
    .score-box { font-size: 4vmin; font-family: 'Fredoka One', cursive; text-shadow: 2px 2px 0 rgba(0,0,0,0.3); }

    .question-box {
      background: rgba(255, 255, 255, 0.95);
      color: #333; padding: 15px 30px; border-radius: 20px;
      font-size: 5vmin; font-weight: bold; display: inline-block;
      box-shadow: 0 8px 0 rgba(0,0,0,0.15); max-width: 80%;
      margin-top: 10px;
    }

    canvas { display: block; width: 100%; height: 100%; }

    .overlay {
      position: absolute; inset: 0; z-index: 100; background: rgba(44, 62, 80, 0.95);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: white; text-align: center;
    }
    h1 { font-family: 'Fredoka One', cursive; font-size: 10vmin; margin: 0; text-shadow: 0 6px 0 rgba(0,0,0,0.2); }
    .btn {
      background: #f1c40f; color: #d35400; font-size: 6vmin; padding: 15px 50px;
      border-radius: 40px; border: none; border-bottom: 8px solid #f39c12;
      cursor: pointer; font-family: 'Fredoka One', cursive; margin-top: 30px; pointer-events: auto;
    }
    .btn:active { transform: translateY(4px); border-bottom-width: 4px; }
  </style>
</head>
<body>

<div id="game-app">
  <div class="ui-layer" id="ui-layer" style="display:none;">
    <div class="top-bar">
      <div class="progress-box"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="score-box">Очки: <span id="score-display">0</span></div>
    </div>
    <div class="question-box" id="question-text">Загрузка...</div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="start-screen" class="overlay">
    <h1 id="uiTitle">QUIZ MINER</h1>
    <div id="cfgNote" style="margin-top:10px; opacity:0.8;"></div>
    <button class="btn" id="btnStart">СТАРТ</button>
  </div>

  <div id="end-screen" class="overlay" style="display:none;">
    <h1 style="font-size: 15vmin;" id="end-emoji">🏆</h1>
    <h1 id="end-title">ВЫ ИГРАЛИ ВЕЛИКОЛЕПНО!</h1>
    <p style="font-size: 6vmin; font-weight: bold;" id="end-score">Счёт: 0</p>
    <button class="btn" id="btnAgain">ЕЩЁ РАЗ</button>
  </div>
</div>

<script>
  // --- НАСТРОЙКИ СВЯЗИ И ПРЕВЬЮ ---
  const urlParams = new URLSearchParams(location.search);
  const cfgId = urlParams.get('id');
  const previewMode = urlParams.get('preview') === '1';

  // Базы данных GitHub
  const JSON_BASES = ["https://nikashum93.github.io/texts/data/", "https://nikashum93.github.io/data/"];

  let CFG = {
    ui: { title: "QUIZ MINER", start: "СТАРТ", again: "ЕЩЁ РАЗ", win: "КВИЗ ПРОЙДЕН!" },
    assets: { hero: "🧙‍♂️", hook: "⚓" },
    gameplay: { hookSpeed: 15, swingSpeed: 0.04 },
    tasks: [] // {q: "2+2", correct: ["4"], wrong: ["3","5"]}
  };

  // --- ЛОГИКА ЗАГРУЗКИ ---
  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'MINER_CFG') {
      CFG = e.data.cfg;
      applyUI();
      if(Game.state === 'idle') Game.reset();
    }
  });

  async function loadConfig() {
    if (previewMode) return;
    if (!cfgId) return;
    try {
      let res = null;
      for (const base of JSON_BASES) {
        try { res = await fetch(`${base}${encodeURIComponent(cfgId)}.json?v=${Date.now()}`); if (res.ok) break; } catch(e){}
      }
      if (res && res.ok) {
        const data = await res.json();
        CFG = Object.assign({}, CFG, data);
      } else throw new Error();
    } catch (e) {
      document.getElementById('cfgNote').textContent = '⚠️ Конфиг не найден: ' + cfgId;
    }
  }

  function applyUI() {
    document.getElementById('uiTitle').textContent = CFG.ui.title || "QUIZ MINER";
    document.getElementById('btnStart').textContent = CFG.ui.start || "СТАРТ";
    document.getElementById('btnAgain').textContent = CFG.ui.again || "ЕЩЁ РАЗ";
  }

  // --- ИГРОВОЙ ДВИЖОК CANVAS ---
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const Game = {
    state: 'idle', // idle, playing, gameover
    hookState: 'swinging', // swinging, shooting, retracting
    score: 0,
    currentTaskIndex: 0,
    targets: [],
    hook: { x: 0, y: 0, angle: 0, length: 60, maxLength: 1000, time: 0, caughtTarget: null },

    reset() {
      this.score = 0;
      this.currentTaskIndex = 0;
      this.state = 'idle';
      this.hookState = 'swinging';
      this.hook.length = 60;
      this.targets = [];
      document.getElementById('start-screen').style.display = 'flex';
      document.getElementById('ui-layer').style.display = 'none';
      document.getElementById('end-screen').style.display = 'none';
      this.draw();
    },

    start() {
      if(!CFG.tasks || CFG.tasks.length === 0) return alert("Нет заданий!");
      this.score = 0;
      this.currentTaskIndex = 0;
      this.state = 'playing';
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('ui-layer').style.display = 'block';
      this.loadTask();
      this.loop();
    },

    loadTask() {
      if (this.currentTaskIndex >= CFG.tasks.length) {
        return this.gameOver();
      }

      const task = CFG.tasks[this.currentTaskIndex];
      document.getElementById('question-text').textContent = task.q;
      const pct = (this.currentTaskIndex / CFG.tasks.length) * 100;
      document.getElementById('progress-fill').style.width = `${pct}%`;

      this.targets = [];
      // Собираем мишени (1 правильная, остальные неправильные)
      let allAnswers = [ { text: task.correct[0] || "Да", isCorrect: true } ];
      (task.wrong || []).forEach(w => {
        if(w.trim()) allAnswers.push({ text: w.trim(), isCorrect: false });
      });
      
      // Перемешиваем
      allAnswers.sort(() => Math.random() - 0.5);

      const rows = [canvas.height * 0.25, canvas.height * 0.4]; // Два ряда
      
      allAnswers.forEach((ans, i) => {
        this.targets.push({
          text: ans.text,
          isCorrect: ans.isCorrect,
          x: Math.random() * (canvas.width - 200) + 100,
          y: rows[i % 2],
          w: 120, h: 50,
          speed: (Math.random() * 2 + 2) * (Math.random() > 0.5 ? 1 : -1)
        });
      });

      this.hookState = 'swinging';
      this.hook.length = 60;
    },

    shoot() {
      if (this.state === 'playing' && this.hookState === 'swinging') {
        this.hookState = 'shooting';
        this.hook.maxLength = canvas.height * 1.2;
      }
    },

    update() {
      if (this.state !== 'playing') return;

      const speed = CFG.gameplay.hookSpeed || 15;
      const swingSpeed = CFG.gameplay.swingSpeed || 0.04;
      
      this.hook.x = canvas.width / 2;
      this.hook.y = canvas.height - 60; // Персонаж внизу

      // Движение мишеней
      this.targets.forEach(t => {
        t.x += t.speed;
        if (t.x > canvas.width - t.w/2 || t.x < t.w/2) t.speed *= -1;
      });

      if (this.hookState === 'swinging') {
        this.hook.time += swingSpeed;
        this.hook.angle = Math.sin(this.hook.time) * (Math.PI / 2.2);
      } 
      else if (this.hookState === 'shooting') {
        this.hook.length += speed;
        
        const hx = this.hook.x + Math.sin(this.hook.angle) * this.hook.length;
        const hy = this.hook.y - Math.cos(this.hook.angle) * this.hook.length;

        // Коллизии
        for (let i = 0; i < this.targets.length; i++) {
          let t = this.targets[i];
          if (Math.abs(hx - t.x) < t.w/2 && Math.abs(hy - t.y) < t.h/2) {
            this.hookState = 'retracting';
            this.hook.caughtTarget = t;
            this.targets.splice(i, 1);
            break;
          }
        }
        if (this.hook.length > this.hook.maxLength) this.hookState = 'retracting';
      } 
      else if (this.hookState === 'retracting') {
        this.hook.length -= speed;
        
        if (this.hook.caughtTarget) {
          this.hook.caughtTarget.x = this.hook.x + Math.sin(this.hook.angle) * this.hook.length;
          this.hook.caughtTarget.y = this.hook.y - Math.cos(this.hook.angle) * this.hook.length;
          this.targets.push(this.hook.caughtTarget);
          this.hook.caughtTarget = null;
        }

        if (this.hook.length <= 60) {
          this.hookState = 'swinging';
          this.hook.length = 60;
          
          let caught = this.targets.find(t => t.y > canvas.height - 150);
          if (caught) {
            if (caught.isCorrect) {
              this.score += 100;
              document.getElementById('score-display').textContent = this.score;
              confetti({ particleCount: 100, spread: 70, origin: { y: 0.9 } });
              this.currentTaskIndex++;
              setTimeout(() => this.loadTask(), 800);
            } else {
              document.getElementById('question-text').textContent = "Ой! Не та мишень!";
              setTimeout(() => this.loadTask(), 1000); // Рестарт вопроса
            }
          }
        }
      }
    },

    draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Рисуем мишени
      this.targets.forEach(t => {
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.beginPath();
        ctx.roundRect(t.x - t.w/2, t.y - t.h/2, t.w, t.h, 10);
        ctx.fill();
        ctx.strokeStyle = '#3498db'; ctx.lineWidth = 3; ctx.stroke();
        
        ctx.fillStyle = '#2c3e50';
        ctx.font = 'bold 20px Montserrat';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(t.text, t.x, t.y);
      });

      // Расчет координат крюка
      this.hook.x = canvas.width / 2;
      this.hook.y = canvas.height - 80;
      const hx = this.hook.x + Math.sin(this.hook.angle) * this.hook.length;
      const hy = this.hook.y - Math.cos(this.hook.angle) * this.hook.length;

      // Веревка
      ctx.beginPath();
      ctx.moveTo(this.hook.x, this.hook.y);
      ctx.lineTo(hx, hy);
      ctx.strokeStyle = '#bdc3c7'; ctx.lineWidth = 4; ctx.stroke();

      // Крюк (Эмодзи или кружок)
      ctx.font = '40px Arial';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(CFG.assets.hook || "⚓", hx, hy);

      // Персонаж
      ctx.font = '80px Arial';
      ctx.fillText(CFG.assets.hero || "🧙‍♂️", this.hook.x, this.hook.y + 40);
    },

    loop() {
      if (this.state !== 'playing') return;
      this.update();
      this.draw();
      requestAnimationFrame(() => this.loop());
    },

    gameOver() {
      this.state = 'gameover';
      document.getElementById('ui-layer').style.display = 'none';
      document.getElementById('end-screen').style.display = 'flex';
      document.getElementById('end-title').textContent = CFG.ui.win || "КВИЗ ПРОЙДЕН!";
      document.getElementById('end-score').textContent = "Счёт: " + this.score;
      confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 } });
    }
  };

  // Управление
  window.addEventListener('keydown', (e) => { if (e.code === 'Space') Game.shoot(); });
  canvas.addEventListener('mousedown', () => Game.shoot());
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); Game.shoot(); }, {passive: false});

  document.getElementById('btnStart').onclick = () => Game.start();
  document.getElementById('btnAgain').onclick = () => Game.start();

  // Запуск
  (async function init() {
    await loadConfig();
    applyUI();
    Game.reset();
  })();
</script>
</body>
</html>
